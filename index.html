<!DOCTYPE html>
<html>
<head>
<title>Name Greeter</title>

<style>
body{
font-family: Arial;
background:#f2f2f2;
text-align:center;
margin-top:50px;
}

.container{
background:white;
width:350px;
margin:auto;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input{
padding:8px;
width:200px;
}

button{
padding:8px 15px;
cursor:pointer;
}

ul{
list-style:none;
padding:0;
}

li{
padding:5px;
border-bottom:1px solid #ddd;
}
</style>

</head>

<body>

<div class="container">

<h2>Name Greeter</h2>

<input id="nameInput" placeholder="Enter name">
<button onclick="addName()">Submit</button>

<p id="greeting"></p>

<h3>Names List</h3>
<ul id="nameList"></ul>

</div>

<script>

let names = [];

function addName(){

let name = document.getElementById("nameInput").value.trim();

if(name === ""){
alert("Enter a name");
return;
}

if(names.includes(name)){
alert("Name already added!");
return;
}

names.push(name);

document.getElementById("greeting").innerText = "Hello " + name;

let li = document.createElement("li");
li.textContent = name;

document.getElementById("nameList").appendChild(li);

document.getElementById("nameInput").value = "";

}

</script>

</body>
</html>
